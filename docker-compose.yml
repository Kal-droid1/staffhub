services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://staffhub:staffhub@db:5432/staffhub?schema=public
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: staffhub
      POSTGRES_PASSWORD: staffhub
      POSTGRES_DB: staffhub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U staffhub"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
